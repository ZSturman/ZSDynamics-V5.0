name: Daily analytics summary

on:
  schedule:
    # 14:00 UTC daily — adjust for your timezone if you want morning delivery.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run daily analytics summary
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          SITE_NAME: zacharysturman.com
        run: npm run daily-analytics
